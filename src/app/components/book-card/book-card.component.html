<a [routerLink]="['/book', book().id]" 
   class="block bg-[#2a2a2a] rounded-lg overflow-hidden hover:bg-[#3a3a3a] transition-all hover:scale-105 cursor-pointer">
  <div class="flex gap-4 p-4">
    <!-- Book Cover -->
    <div class="flex-shrink-0">
      <img [src]="book().coverImage" 
           [alt]="book().title"
           class="w-24 h-36 object-cover rounded-md shadow-lg">
    </div>

    <!-- Book Details -->
    <div class="flex-1 flex flex-col justify-between min-w-0">
      <div>
        <h3 class="text-lg font-semibold text-white mb-1 truncate">{{ book().title }}</h3>
        <p class="text-sm text-gray-400 mb-2">by {{ book().author }}</p>
        <p class="text-xs text-gray-500 mb-2 line-clamp-2">{{ book().description }}</p>
        
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs px-2 py-1 bg-gray-700 text-gray-300 rounded">{{ book().format }}</span>
          @for (tag of book().tags; track tag) {
            <span class="text-xs px-2 py-1 bg-blue-900/30 text-blue-400 rounded">{{ tag }}</span>
          }
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xl font-bold text-white">₹{{ book().price }}</span>
            @if (book().originalPrice) {
              <span class="text-sm text-gray-500 line-through">₹{{ book().originalPrice }}</span>
            }
          </div>
          <p class="text-xs text-gray-500">Delivery by {{ book().deliveryDate }}</p>
        </div>

        <button 
          (click)="onAddToCart($event)"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
          Add to Cart
        </button>
      </div>
    </div>
  </div>
</a>
